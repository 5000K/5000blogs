address: ":8080"

paths:
  posts: './demo/posts'
  static: './template'

log_level: 'info'
page_size: 10

blog_name: 'My Blog'
icon: './template/icon.png'  # path to a PNG file served as favicon and og:logo

nav_links:
  - name: 'Posts'
    url: '/posts'
  - name: 'About'
    url: '/about'

# Custom page routes: map URL paths to post slugs.
# The / path defaults to slug 'home' if not listed.
# pages:
#   - path: /about
#     slug: about

site_url: 'http://localhost:8080'
feed_title: 'My Blog'
feed_description: 'Latest posts from My Blog'

og_image:
  enabled: true
  bg_color: '#111111'
  text_color: '#f0f0f0'
  sub_color: '#999999'
  accent_color: '#7eb8f7'