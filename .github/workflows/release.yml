name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. v1.0.0)"
        required: true

defaults:
  run:
    shell: bash

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce development branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/development" ]; then
            echo "This workflow may only run on the development branch."
            exit 1
          fi

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

  release:
    needs: check-branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux x86_64 binary
        run: GOOS=linux GOARCH=amd64 go build -o 5000blogs-x86_64-linux .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            5000blogs-x86_64-linux
            plugins/link-preview.js
            plugins/sort-tables.js

  merge-to-stable:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge development into stable
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin stable
          git checkout stable
          git merge --ff-only origin/development
          git push origin stable
