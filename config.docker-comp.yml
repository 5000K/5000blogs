address: ":8080"

paths:
  template: /static/template.docs.html
  theme: /static/theme.docs.css

sources:
 - type: filesystem
   dir: ./docs

log_level: 'info'
page_size: 10

blog_name: 'My Blog'

nav_links:
  - name: 'Posts'
    url: '/posts'

site_url: 'http://localhost:8080'
feed_description: 'Latest posts from My Blog'
feed_size: 20  # number of posts to include in RSS and Atom feeds
rss_content: 'none'  # 'none' (default), 'text' (plain text), or 'html' (rendered HTML)

og_image:
  enabled: true
  bg_color: '#111111'
  text_color: '#f0f0f0'
  sub_color: '#999999'
  accent_color: '#7eb8f7'
